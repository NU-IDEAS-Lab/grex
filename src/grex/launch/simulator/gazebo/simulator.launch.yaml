launch:

# Launch arguments.
- arg:
    name: "map"
    default: "cumberland"
- arg:
    name: "gazebo_world_file"
    default: "$(find-pkg-share grex)/models/maps/$(var map)/model.sdf"
- arg:
    name: "headless"
    default: "false"

# Gazebo simulation server.
- group:
    # - set_env:
    #     name: "DISPLAY"
    #     value: ":0"
    - include:
        file: "$(find-pkg-share ros_gz_sim)/launch/ros_gz_sim.launch.py"
        arg:
            - name: "world_sdf_file"
              value: "$(var gazebo_world_file)"
            - name: "bridge_name"
              value: "grex_gz_bridge"
            - name: "use_composition"
              value: "True"


